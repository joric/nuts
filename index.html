<style>
.game-area {
  display: flex;
  justify-content: center;
  gap: 0px;
  flex-wrap: wrap;
  border-radius: 15px;
  align-items: flex-end;
}

.bolt-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.bolt {
  background: linear-gradient(90deg, #9aa3b8, #cbd2e0 30%, #b0b9cc 50%, #7f8aa4 85%, #9aa3b8);
  width: 35px;
  height: 190px;
  border-radius: 8px 8px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 0px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 8px 14px rgba(0,0,0,0.2);
  border-bottom: 3px solid #5d6e8a;
  justify-content: flex-end;
  position: relative;
  margin: 5px 26px;
  overflow: visible;
}

.bolt::before {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 75px;
  height: 30px;
  background: linear-gradient(90deg, #9aa3b8, #cbd2e0 30%, #b0b9cc 50%, #7f8aa4 85%, #9aa3b8);
  border-radius: 5px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  z-index: 1;
}

.nut.selected {
  outline: 3px solid rgba(0,0,0,0.75);
}

.bolt.completed {
  opacity: 0.75;
}

.bolt.completed::after {
  content: "✓";
  position: absolute;
  font-size: 3rem;
  font-weight: bold;
  color: #2ecc71;
  text-shadow: 1px 1px 1px rgba(0,0,0,1);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
}

.nut {
  width: 75px;
  height: 32px;
  margin: 4px 0;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: white;
  text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  background: linear-gradient(90deg, #b8956a 0%, #cdb38c 25%, #d8c4a0 50%, #cdb38c 75%, #b8956a 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.2), 0 2px 5px rgba(0,0,0,0.2);
  position: relative;
  z-index: 2;
}

.color-blue { background: deepskyblue; }
.color-red { background: orangered; }
.color-orange { background: orange; }
.color-green { background: seagreen; }
.color-yellow { background: #f1c40f; }
.color-purple { background: #9b59b6; }
.color-pink { background: #e84393; }
.color-brown { background: #8B4513; }
.color-lime { background: yellowgreen; }
.color-l_blue { background: #87ceeb; }
.color-l_red { background: #ff6b6b; }
.color-l_green { background: #98fb98; }
.color-silver { background: #c0c0c0; }

</style>

<body>

<nav class="navbar bg-body-tertiary">
  <div class="container">
    <div class="row justify-content-center w-100">
      <div class="col">
        <div class="d-flex align-items-center w-100">
          <a class="navbar-brand" href="#">Nuts and Bolts</a>
          <div class="d-flex align-items-center ms-auto gap-2">
            <label for="theme-switch" class="text-body cursor-pointer">
              <i class="bi bi-sun"></i>
            </label>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" id="theme-switch" type="checkbox" role="switch">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="container p-3">

  <div class="text-center pb-3">
    <div id="message">Click on a bolt to select it, then click on another bolt to move the top nut</div>
  </div>

  <div class="game-area d-flex flex-wrap align-items-end bg-light p-2 rounded bg-body-tertiary" id="gameArea">
  </div>

  <div class="controls text-center p-3">
    <button class="reset-btn btn btn-danger" onclick="reset()">Reset</button>
    <button class="solve-btn btn btn-success" onclick="solve()">Solve</button>
    <button class="step-btn  btn btn-primary" onclick="next()">Next</button>
    <button class="undo-btn  btn btn-secondary" onclick="undo()">Undo</button>
    <button class="redo-btn  btn btn-secondary" onclick="redo()">Redo</button>
  </div>


  <nav class="pt-1">
    <div class="nav nav-tabs" id="nav-tab" role="tablist">
      <button class="nav-link active" id="nav-contact-tab" data-bs-toggle="tab" data-bs-target="#nav-contact" type="button" role="tab" aria-controls="nav-contact" aria-selected="true">Select Level</button>
      <button class="nav-link" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home" type="button" role="tab" aria-controls="nav-home" aria-selected="false">Solution</button>
      <button class="nav-link" id="nav-remap-tab" data-bs-toggle="tab" data-bs-target="#nav-remap" type="button" role="tab" aria-controls="nav-remap" aria-selected="false">Display</button>
      <button class="nav-link" id="nav-profile-tab" data-bs-toggle="tab" data-bs-target="#nav-profile" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">Moves Log</button>
    </div>
  </nav>

  <div class="tab-content" id="nav-tabContent">

    <div class="tab-pane fade show active p-3" id="nav-contact" role="tabpanel" aria-labelledby="nav-contact-tab">

      <div class="container">
          <div class="row g-3 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Level Number</label>
              </div>
              <div class="col-md-9">
                  <select class="form-select" id="levelSelector" onchange="select_level()"></select>
              </div>
          </div>

          <div class="row g-3 mt-2 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Level Data</label>
              </div>
              <div class="col-md-9">
                  <textarea id="levelInput" class="form-control" rows="5">5</textarea>
              </div>
          </div>

          <div class="row g-3 mt-2">
              <div class="col-md-3"></div>
              <div class="col-md-9">
                  <button onclick="loadLevel()" class="btn btn-primary">Load Level from Text</button>
              </div>
          </div>
      </div>

    </div>

    <div class="tab-pane fade p-3" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab">
      <div id="solutionDiv" class="solution-panel">
        <div id="solutionContent" class="solution-content solution-empty">Click "Solve" to generate optimal moves. Then use "Next Move".</div>
      </div>
    </div>

    <div class="tab-pane fade p-3" id="nav-remap" role="tabpanel" aria-labelledby="nav-remap-tab">

      <div class="container">
          <div class="row g-3 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Color Shift</label>
              </div>
              <div class="col-md-9">
                <label id="rangeValue1" for="customRange1" class="form-label">0</label>
                <input type="range" class="form-range" min="-16" max="16" step="1" id="customRange1" oninput="updateOptions({name:'colorShift',value:this.value,label:'rangeValue1'})">
              </div>
          </div>

          <div class="row g-3 mt-2 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Bolt Shift</label>
              </div>
              <div class="col-md-9">
                <label id="rangeValue2" for="customRange2" class="form-label">0</label>
                <input type="range" class="form-range" min="-16" max="16" step="1" id="customRange2" oninput="updateOptions({name:'boltShift',value:this.value,label:'rangeValue2'})">
              </div>
          </div>
      </div>


    </div>

    <div class="tab-pane fade p-3" id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab">
      <div class="moves-list">
        <pre id="movesLog"></pre>
      </div>
    </div>

  </div>


</div> <!--/top-level-container-->

</div>
