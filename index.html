<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuts and Bolts</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="main.js"></script>
<script src="solver.js"></script>

<style>
.game-area {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  background: #f0f0f0;
  border-radius: 15px;
  align-items: flex-end;
}

.bolt-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.bolt {
  background: linear-gradient(90deg, #9aa3b8, #cbd2e0 30%, #b0b9cc 50%, #7f8aa4 85%, #9aa3b8);
  width: 45px;
  height: 190px;
  border-radius: 8px 8px 12px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 0px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 8px 14px rgba(0,0,0,0.2);
  border-bottom: 3px solid #5d6e8a;
  justify-content: flex-end;
  position: relative;
  margin: 5px;
}

.bolt::before {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 75px;
  height: 30px;
  background: linear-gradient(90deg, #9aa3b8, #cbd2e0 30%, #b0b9cc 50%, #7f8aa4 85%, #9aa3b8);
  border-radius: 5px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  z-index: 1;
}

.bolt.selected {
  box-shadow: 0 0 0 3px orange;
}

.bolt.completed {
  box-shadow: 0 0 0 2px #2ecc71;
  opacity: 0.5;
}

.bolt.completed::after {
  content: "✓";
  position: absolute;
  font-size: 3rem;
  font-weight: bold;
  color: #2ecc71;
  text-shadow: 1px 1px 1px rgba(0,0,0,1);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
}

.nut {
  width: 75px;
  height: 32px;
  margin: 4px 0;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: white;
  text-shadow: 0 1px 1px rgba(0,0,0,0.2);
  box-shadow: inset 0 -1px 0 rgba(0,0,0,0.1), 0 2px 5px rgba(0,0,0,0.2);
  background: linear-gradient(145deg, #cdb38c, #b8956a);
  position: relative;
  z-index: 2;
}

.color-blue { background: deepskyblue; }
.color-red { background: orangered; }
.color-orange { background: orange; }
.color-green { background: seagreen; }
.color-yellow { background: #f1c40f; }
.color-purple { background: #9b59b6; }
.color-pink { background: #e84393; }
.color-brown { background: #8B4513; }
.color-lime { background: yellowgreen; }
.color-l_blue { background: #87ceeb; }
.color-l_red { background: #ff6b6b; }
.color-l_green { background: #98fb98; }
.color-silver { background: #c0c0c0; }

</style>

</head>

<body>

<div class="container p-3">
  <h1 class="text-center">Nuts and Bolts</h1>

  <div class="text-center pb-3">
    <div id="message">Click on a bolt to select it, then click on another bolt to move the top nut</div>
  </div>

  <div class="game-area d-flex flex-wrap align-items-end bg-light p-2 rounded" id="gameArea">
  </div>

  <div class="controls text-center p-3">
    <button class="reset-btn btn btn-danger" onclick="resetGame()">Reset</button>
    <button class="solve-btn btn btn-success" onclick="solveGame(); document.querySelector('#nav-home-tab').click();">Solve</button>
    <button class="step-btn  btn btn-primary" onclick="stepSolution()">Next Move</button>
  </div>


  <nav class="pt-1">
    <div class="nav nav-tabs" id="nav-tab" role="tablist">
      <button class="nav-link active" id="nav-contact-tab" data-bs-toggle="tab" data-bs-target="#nav-contact" type="button" role="tab" aria-controls="nav-contact" aria-selected="true">Select Level</button>
      <button class="nav-link" id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home" type="button" role="tab" aria-controls="nav-home" aria-selected="false">Solution</button>
      <button class="nav-link" id="nav-profile-tab" data-bs-toggle="tab" data-bs-target="#nav-profile" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">Moves Log</button>
    </div>
  </nav>


  <div class="tab-content" id="nav-tabContent">

    <div class="tab-pane fade show active p-3" id="nav-contact" role="tabpanel" aria-labelledby="nav-contact-tab">

      <div class="container">
          <div class="row g-3 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Level Number</label>
              </div>
              <div class="col-md-9">
                  <select class="form-select" id="levelSelector" onchange="select_level()"></select>
              </div>
          </div>

          <div class="row g-3 mt-2 align-items-start">
              <div class="col-md-3">
                  <label class="form-label fw-bold">Level Data</label>
              </div>
              <div class="col-md-9">
                  <textarea id="levelInput" class="form-control" rows="5">5</textarea>
              </div>
          </div>

          <div class="row g-3 mt-2">
              <div class="col-md-3"></div>
              <div class="col-md-9">
                  <button onclick="loadLevel()" class="btn btn-primary">Load Level from Text</button>
              </div>
          </div>
      </div>
    </div>

    <div class="tab-pane fade p-3" id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab">
      <div id="solutionDiv" class="solution-panel">
        <div id="solutionContent" class="solution-content solution-empty">Click "Solve" to generate optimal moves. Then use "Next Move".</div>
      </div>
    </div>

    <div class="tab-pane fade p-3" id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab">
      <div class="moves-list">
        <pre id="movesLog"></pre>
      </div>
    </div>

  </div>


</div> <!--/top-level-container-->

</body>
</html>
