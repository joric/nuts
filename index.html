<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolts and Nuts</title>
    <style>
        * {
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .game-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 15px;
            align-items: flex-end;
        }

        .bolt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .bolt {
            background: linear-gradient(to bottom, #888, #999);
            width: 60px;
            min-height: 180px;
            border-radius: 15px 15px 5px 5px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 5px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .bolt.selected {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px #ffd700, 0 5px 20px rgba(0,0,0,0.3);
        }

        .nut {
            width: 50px;
            height: 35px;
            margin: 3px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .bolt-header {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        .bolt-number {
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: #667eea;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .reset-btn { background: #f39c12; }
        .solve-btn { background: #27ae60; }
        .step-btn { background: #3498db; }

        .message {
            text-align: center;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .moves-list {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .moves-list h3 {
            margin-top: 0;
            color: #333;
        }

        .moves-list pre {
            margin: 0;
            white-space: pre-wrap;
        }

        .level-input {
            margin: 20px;
            text-align: center;
        }

        textarea {
            width: 80%;
            max-width: 500px;
            padding: 10px;
            font-family: monospace;
            border: 2px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }

        .color-blue { background: #3498db; }
        .color-red { background: #e74c3c; }
        .color-orange { background: #e67e22; }
        .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; }
        .color-purple { background: #9b59b6; }
        .color-pink { background: #e84393; }
        .color-brown { background: #8B4513; }

        .color-lime { background: #32cd32; }
        .color-l_blue { background: #87ceeb; }
        .color-l_red { background: #ff6b6b; }
        .color-l_green { background: #98fb98; }
        .color-silver { background: #c0c0c0; }

        
        .ground {
            width: 100%;
            height: 4px;
            background: #333;
            margin-top: 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bolts and Nuts</h1>
        <div class="description">
            Move nuts from top of bolts. Can only place on matching color or empty bolt.<br>
            Max 4 nuts per bolt. When 4 matching colors stack, they disappear!<br>
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="controls">
            <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
            <button class="solve-btn" onclick="solveGame()">🤖 Solve</button>
            <button class="step-btn" onclick="stepSolution()">⏭️ Next Move</button>
        </div>

        <div id="message" class="message info">Click on a bolt to select it, then click on another bolt to move the top nut</div>

        <div class="level-input">

          <select id="levelSelector" onchange="select_level()">
            <option>Select Level</option>
          </select>

          <br/>
          <br/>

            <textarea id="levelInput" rows="5" cols="50">5
blue,red,orange,blue
blue,red,orange,orange
red,orange,blue,red</textarea><br>

            <button onclick="loadLevel()">Load Level</button>
        </div>

        
        <div class="moves-list">
            <h3>📝 Moves Log</h3>
            <pre id="movesLog">No moves yet...</pre>
        </div>


    </div>

    <script>
        let bolts = [];
        let selectedBolt = null;
        let solutionMoves = [];
        let currentMoveIndex = 0;
        let moveLog = [];
        let numBolts = 0;


        const colorMap = {
            'blue': 'color-blue',
            'red': 'color-red',
            'orange': 'color-orange',
            'green': 'color-green',
            'yellow': 'color-yellow',
            'purple': 'color-purple',
            'pink': 'color-pink',
            'brown': 'color-brown',
            'lime': 'color-lime',
            'l_blue': 'color-l_blue',
            'l_red': 'color-l_red',
            'l_green': 'color-l_green',
            'silver': 'color-silver'
        };


/*
so the level to screen mapping is (possibly):


1 blue,red,orange,blue -> orange,blue,lime,orange
2 blue,red,orange,orange -> orange,blue,lime,lime
3 red,orange,blue,red -> blue,lime,orange,blue
4 free
5 free

        const colorMap = {
            'blue': 'color-orange',
            'red': 'color-blue',
            'orange': 'color-green',
            'green': 'color-green',
            'yellow': 'color-yellow',
            'purple': 'color-purple',
            'pink': 'color-pink',
            'brown': 'color-brown'
        };
*/

        function parseLevel(levelText) {
            const lines = levelText.trim().split('\n').filter(l => l.trim());
            if (lines.length === 0) return null;
            
            const num = parseInt(lines[0]);
            const stacks = [];
            
            // Parse each stack - colors are listed from TOP to BOTTOM
            // We store them as-is (index 0 = top, last index = bottom)
            // This matches the visual display
            for (let i = 1; i < lines.length; i++) {
                const colors = lines[i].split(',').map(c => c.trim());
                stacks.push(colors);
                console.log(`Bolt ${i}: File order (top to bottom): [${colors.join(', ')}]`);
                console.log(`  Top nut: ${colors[0]}, Bottom nut: ${colors[colors.length - 1]}`);
            }
            
            const emptyBolts = num - stacks.length;
            for (let i = 0; i < emptyBolts; i++) {
                stacks.push([]);
            }
            
            console.log('Parsed level (top-to-bottom storage):', stacks.map(s => [...s]));
            return { numBolts: num, stacks: stacks };
        }

        function loadLevel() {
            const levelText = document.getElementById('levelInput').value;
            const parsed = parseLevel(levelText);
            
            if (!parsed) {
                showMessage('Invalid level format!', 'error');
                return;
            }
            
            numBolts = parsed.numBolts;
            bolts = parsed.stacks.map(stack => [...stack]);
            selectedBolt = null;
            solutionMoves = [];
            currentMoveIndex = 0;
            moveLog = [];
            updateMovesLog();
            renderGame();
            showMessage('Level loaded! Click on bolts to play.', 'info');
            checkWinCondition();
            console.log('Game loaded (top-to-bottom storage):', bolts.map(b => [...b]));
            console.log('Top nuts (index 0):', bolts.map(b => b.length > 0 ? b[0] : 'empty'));
            console.log('Bottom nuts (last index):', bolts.map(b => b.length > 0 ? b[b.length - 1] : 'empty'));
        }

        function checkAndRemoveMatches() {
            let removed = false;
            for (let i = 0; i < bolts.length; i++) {
                if (bolts[i].length >= 4) {
                    // Check top 4 nuts (first 4 elements since index 0 is top)
                    const top4 = bolts[i].slice(0, 4);
                    if (top4.every(color => color === top4[0])) {
                        console.log(`Removing 4 ${top4[0]} nuts from top of bolt ${i + 1}`);
                        bolts[i].splice(0, 4);
                        removed = true;
                        addMoveToLog(`✨ Auto-removed 4 ${top4[0]} nuts from bolt ${i + 1}`);
                        break;
                    }
                }
            }
            if (removed) {
                renderGame();
                checkWinCondition();
                return true;
            }
            return false;
        }

        function canMove(src, dst) {
            if (src === dst) return false;
            if (bolts[src].length === 0) return false;
            if (bolts[dst].length >= 4) return false;
            
            const srcTop = bolts[src][0]; // Top is at index 0
            if (bolts[dst].length === 0) return true;
            
            const dstTop = bolts[dst][0]; // Top is at index 0
            return srcTop === dstTop;
        }

        function makeMove(src, dst, record = true) {
            if (!canMove(src, dst)) return false;
            
            const nut = bolts[src].shift(); // Remove from top (index 0)
            bolts[dst].unshift(nut); // Add to top (index 0)
            
            console.log(`Move: ${src + 1} → ${dst + 1} (${nut})`);
            console.log('State after move (top-to-bottom):', bolts.map(b => [...b]));
            console.log('Top nuts now:', bolts.map(b => b.length > 0 ? b[0] : 'empty'));
            
            if (record) {
                addMoveToLog(`${src + 1} → ${dst + 1} (${nut})`);
            }
            
            renderGame();
            
            // Auto-remove matches
            while (checkAndRemoveMatches()) {
                renderGame();
            }
            
            checkWinCondition();
            return true;
        }

        function addMoveToLog(move) {
            moveLog.push(move);
            updateMovesLog();
        }

        function updateMovesLog() {
            const logElement = document.getElementById('movesLog');
            if (moveLog.length === 0) {
                logElement.textContent = 'No moves yet...';
            } else {
                logElement.textContent = moveLog.join('\n');
                logElement.scrollTop = logElement.scrollHeight;
            }
        }

        function checkWinCondition() {
            const allEmpty = bolts.every(bolt => bolt.length === 0);
            if (allEmpty) {
                showMessage('🎉 Congratulations! You cleared all nuts! 🎉', 'success');
                console.log('WIN CONDITION MET! All nuts cleared.');
                return true;
            }
            return false;
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            setTimeout(() => {
                if (document.getElementById('message').textContent === msg) {
                    messageDiv.className = 'message info';
                    messageDiv.textContent = 'Click on a bolt to select it, then click on another bolt to move the top nut';
                }
            }, 3000);
        }

        function renderGame() {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '';
            
            for (let i = 0; i < bolts.length; i++) {
                const boltContainer = document.createElement('div');
                boltContainer.className = 'bolt-container';
                
                const bolt = document.createElement('div');
                bolt.className = 'bolt';
                if (selectedBolt === i) {
                    bolt.classList.add('selected');
                }
                
                const nutContainer = document.createElement('div');
                nutContainer.style.display = 'flex';
                nutContainer.style.flexDirection = 'column';
                nutContainer.style.width = '100%';
                nutContainer.style.alignItems = 'center';
                nutContainer.style.justifyContent = 'flex-start';
                
                // Display nuts from TOP to BOTTOM
                // bolts[i][0] is top, bolts[i][-1] is bottom
                // Display exactly in this order: top first, then down to bottom
                for (let j = 0; j < bolts[i].length; j++) {
                    const nut = document.createElement('div');
                    const color = bolts[i][j];
                    nut.className = `nut ${colorMap[color] || 'color-blue'}`;
                    nut.textContent = color;
                    nutContainer.appendChild(nut);
                }
                
                bolt.appendChild(nutContainer);
                
                const header = document.createElement('div');
                header.className = 'bolt-header';
                const topNut = bolts[i].length > 0 ? bolts[i][0] : 'empty';
                const bottomNut = bolts[i].length > 0 ? bolts[i][bolts[i].length - 1] : 'empty';
                //header.innerHTML = `<span class="bolt-number">Bolt ${i + 1}</span><br>${bolts[i].length}/4<br><small style="font-size:10px">top: ${topNut} | bottom: ${bottomNut}</small>`;
                
                boltContainer.appendChild(bolt);
                boltContainer.appendChild(header);
                
                bolt.onclick = (function(boltIndex) {
                    return function() {
                        handleBoltClick(boltIndex);
                    };
                })(i);
                
                gameArea.appendChild(boltContainer);
            }
            
            // Add ground line
            const ground = document.createElement('div');
            ground.className = 'ground';
            gameArea.appendChild(ground);
        }

        function handleBoltClick(boltIndex) {
            if (solutionMoves.length > 0 && currentMoveIndex < solutionMoves.length) {
                showMessage('Auto-solver is active. Press Reset to play manually.', 'error');
                return;
            }
            
            if (selectedBolt === null) {
                if (bolts[boltIndex].length > 0) {
                    selectedBolt = boltIndex;
                    renderGame();
                    const topNut = bolts[boltIndex][0];
                    showMessage(`Selected bolt ${boltIndex + 1} (top nut: ${topNut})`, 'info');
                } else {
                    showMessage('Cannot select empty bolt!', 'error');
                }
            } else {
                if (makeMove(selectedBolt, boltIndex, true)) {
                    selectedBolt = null;
                    renderGame();
                } else {
                    showMessage('Invalid move! Check color match and bolt capacity.', 'error');
                    selectedBolt = null;
                    renderGame();
                }
            }
        }

        function resetGame() {
            const levelText = document.getElementById('levelInput').value;
            const parsed = parseLevel(levelText);
            if (parsed) {
                bolts = parsed.stacks.map(stack => [...stack]);
                selectedBolt = null;
                solutionMoves = [];
                currentMoveIndex = 0;
                moveLog = [];
                updateMovesLog();
                renderGame();
                showMessage('Game reset!', 'info');
                checkWinCondition();
                console.log('Game reset to (top-to-bottom):', bolts.map(b => [...b]));
                console.log('Top nuts:', bolts.map(b => b.length > 0 ? b[0] : 'empty'));
            }
        }

        // Solver using BFS
        function solveGame() {
            showMessage('Solving... This may take a moment.', 'info');
            
            setTimeout(() => {
                const solution = findSolution(bolts);
                if (solution) {
                    solutionMoves = solution;
                    currentMoveIndex = 0;
                    console.log('Solution found! Moves:', solutionMoves.map(m => `${m.src + 1} → ${m.dst + 1}`));
                    showMessage(`Solution found! ${solutionMoves.length} moves. Click "Next Move" to execute.`, 'success');
                } else {
                    console.log('No solution found');
                    showMessage('No solution found! The level might be unsolvable.', 'error');
                    solutionMoves = [];
                }
            }, 100);
        }

        function stateToString(state) {
            return state.map(bolt => bolt.join(',')).join('|');
        }

        function stepSolution() {
            if (solutionMoves.length === 0) {
                showMessage('No solution loaded. Click "Solve" first.', 'error');
                return;
            }
            
            if (currentMoveIndex >= solutionMoves.length) {
                showMessage('Solution complete!', 'success');
                console.log('All solution moves executed');
                return;
            }
            
            const move = solutionMoves[currentMoveIndex];
            console.log(`Executing solution move ${currentMoveIndex + 1}/${solutionMoves.length}: ${move.src + 1} → ${move.dst + 1}`);
            
            if (makeMove(move.src, move.dst, true)) {
                currentMoveIndex++;
                if (currentMoveIndex >= solutionMoves.length) {
                    showMessage('✅ Solution completed!', 'success');
                    console.log('Solution execution complete');
                }
            } else {
                console.error('Failed to execute move:', move);
                showMessage('Error executing solution move!', 'error');
                solutionMoves = [];
            }
        }

        // Expose debug functions to console
        window.debug = {
            getState: () => bolts.map(b => [...b]),
            getTopNuts: () => bolts.map(b => b.length > 0 ? b[0] : 'empty'),
            getBottomNuts: () => bolts.map(b => b.length > 0 ? b[b.length - 1] : 'empty'),
            getMoves: () => moveLog,
            getSolution: () => solutionMoves,
            canMove: (src, dst) => canMove(src - 1, dst - 1),
            makeMove: (src, dst) => makeMove(src - 1, dst - 1, true),
            reset: () => resetGame(),
            solve: () => solveGame()
        };
        
        console.log('Debug commands available:');
        console.log('  debug.getState() - Get current state (top-to-bottom storage)');
        console.log('  debug.getTopNuts() - Get top nuts of each bolt');
        console.log('  debug.getBottomNuts() - Get bottom nuts of each bolt');
        console.log('  debug.getMoves() - Get move history');
        console.log('  debug.canMove(src, dst) - Check if move is valid (1-indexed)');
        console.log('  debug.makeMove(src, dst) - Make a move (1-indexed)');
        console.log('  debug.reset() - Reset game');
        console.log('  debug.solve() - Run solver');

        window.addEventListener('DOMContentLoaded', function() {
          const select = document.querySelector('#levelSelector');
          for (let i = 1; i <= 100; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            select.appendChild(option);
          }
        });


        function fetchLevel(levelNumber) {
          // Load the file from data/LevelX.txt
          const textarea = document.getElementById('levelInput');
          const select = document.querySelector('#levelSelector');

          fetch(`data/Level${levelNumber}.txt`)
            .then(response => {
              if (!response.ok) {
                throw new Error(`Level ${levelNumber} not found`);
              }
              return response.text();
            })
            .then(data => {
              textarea.value = data;
              select.selectedIndex = levelNumber;

              loadLevel();
            })
            .catch(error => {
              console.error('Error:', error);
              textarea.value = `Error: Could not load Level ${levelNumber}.txt\n\nMake sure the file exists at: data/Level${levelNumber}.txt`;
            });
        }

        // Your select_level function (add your logic here)
        function select_level() {
          const select = document.querySelector('#levelSelector');
          const levelNumber = select.value;
          console.log('Selected level:', levelNumber);
          fetchLevel(levelNumber);
        }


        // Initialize with default level
        //loadLevel();

        document.addEventListener('DOMContentLoaded', function() {
          fetchLevel(1);
        });

    </script>

    <script src="solver.js"></script>

</body>
