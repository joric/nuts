<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolts and Nuts</title>
    <style>
        * {
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .game-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 15px;
            align-items: flex-end;
        }

        .bolt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .bolt {
            background: linear-gradient(to bottom, #888, #999);
            width: 80px;
            min-height: 220px;
            border-radius: 15px 15px 5px 5px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 5px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .bolt.selected {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px #ffd700, 0 5px 20px rgba(0,0,0,0.3);
        }

        .bolt.completed {
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            box-shadow: 0 0 0 2px #27ae60, 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .bolt.completed::before {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #27ae60;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }

        .bolt.completed::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(39, 174, 96, 0.2);
            border-radius: 15px 15px 5px 5px;
            pointer-events: none;
            z-index: 5;
        }

        .nut {
            width: 60px;
            height: 40px;
            margin: 3px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .bolt-header {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        .bolt-number {
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: #667eea;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .reset-btn { background: #f39c12; }
        .solve-btn { background: #27ae60; }
        .step-btn { background: #3498db; }

        .message {
            text-align: center;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .moves-list {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .moves-list h3 {
            margin-top: 0;
            color: #333;
        }

        .moves-list pre {
            margin: 0;
            white-space: pre-wrap;
        }

        .level-input {
            margin: 20px;
            text-align: center;
        }

        textarea {
            width: 80%;
            max-width: 500px;
            padding: 10px;
            font-family: monospace;
            border: 2px solid #ddd;
            border-radius: 5px;
            resize: vertical;
        }

        .color-blue { background: #3498db; }
        .color-red { background: #e74c3c; }
        .color-orange { background: #e67e22; }
        .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; }
        .color-purple { background: #9b59b6; }
        .color-pink { background: #e84393; }
        .color-brown { background: #8B4513; }
        .color-lime { background: #32cd32; }
        .color-l_blue { background: #87ceeb; }
        .color-l_red { background: #ff6b6b; }
        .color-l_green { background: #98fb98; }
        .color-silver { background: #c0c0c0; }
        
        .ground {
            width: 100%;
            height: 4px;
            background: #333;
            margin-top: 10px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bolts and Nuts</h1>
        <div class="description">
            Move nuts from top of bolts. Can only place on matching color or empty bolt.<br>
            Max 4 nuts per bolt. When 4 matching colors stack, bolt changes style (completed)!
        </div>

        <div class="game-area" id="gameArea"></div>

        <div class="controls">
            <button class="reset-btn" onclick="resetGame()">🔄 Reset</button>
            <button class="solve-btn" onclick="solveGame()">🤖 Solve</button>
            <button class="step-btn" onclick="stepSolution()">⏭️ Next Move</button>
        </div>

        <div id="message" class="message info">Click on a bolt to select it, then click on another bolt to move the top nut</div>

        <div class="level-input">
            <select id="levelSelector" onchange="select_level()">
                <option>Select Level</option>
            </select>
            <br/><br/>
            <textarea id="levelInput" rows="5" cols="50">5
blue,red,orange,blue
blue,red,orange,orange
red,orange,blue,red</textarea><br>
            <button onclick="loadLevel()">Load Level</button>
        </div>
        
        <div class="moves-list">
            <h3>📝 Moves Log</h3>
            <pre id="movesLog">No moves yet...</pre>
        </div>
    </div>

    <script>
        let bolts = [];
        let boltCompleted = [];
        let selectedBolt = null;
        let solutionMoves = [];
        let currentMoveIndex = 0;
        let moveLog = [];
        let numBolts = 0;

        const colorMap = {
            'blue': 'color-blue',
            'red': 'color-red',
            'orange': 'color-orange',
            'green': 'color-green',
            'yellow': 'color-yellow',
            'purple': 'color-purple',
            'pink': 'color-pink',
            'brown': 'color-brown',
            'lime': 'color-lime',
            'l_blue': 'color-l_blue',
            'l_red': 'color-l_red',
            'l_green': 'color-l_green',
            'silver': 'color-silver'
        };

        function parseLevel(levelText) {
            const lines = levelText.trim().split('\n').filter(l => l.trim());
            if (lines.length === 0) return null;
            
            const num = parseInt(lines[0]);
            const stacks = [];
            
            for (let i = 1; i < lines.length; i++) {
                const colors = lines[i].split(',').map(c => c.trim());
                stacks.push(colors);
            }
            
            const emptyBolts = num - stacks.length;
            for (let i = 0; i < emptyBolts; i++) {
                stacks.push([]);
            }
            
            return { numBolts: num, stacks: stacks };
        }

        function checkAndMarkCompletedBolts() {
            let changed = false;
            for (let i = 0; i < bolts.length; i++) {
                if (boltCompleted[i]) continue;
                
                if (bolts[i].length >= 4) {
                    const top4 = bolts[i].slice(0, 4);
                    if (top4.every(color => color === top4[0])) {
                        boltCompleted[i] = true;
                        changed = true;
                        addMoveToLog(`✅ Bolt ${i + 1} completed with 4 ${top4[0]} nuts!`);
                    }
                }
            }
            if (changed) {
                renderGame();
                checkWinCondition();
                return true;
            }
            return false;
        }

        function canMove(src, dst) {
            if (src === dst) return false;
            if (boltCompleted[src]) return false;
            if (bolts[src].length === 0) return false;
            if (boltCompleted[dst]) return false;
            if (bolts[dst].length >= 4) return false;
            
            const srcTop = bolts[src][0];
            if (bolts[dst].length === 0) return true;
            
            const dstTop = bolts[dst][0];
            return srcTop === dstTop;
        }

        function makeMove(src, dst, record = true) {
            if (!canMove(src, dst)) return false;
            
            const nut = bolts[src].shift();
            bolts[dst].unshift(nut);
            
            if (record) {
                addMoveToLog(`${src + 1} → ${dst + 1} (${nut})`);
            }
            
            renderGame();
            
            while (checkAndMarkCompletedBolts()) {
                renderGame();
            }
            
            checkWinCondition();
            return true;
        }

        function addMoveToLog(move) {
            moveLog.push(move);
            updateMovesLog();
        }

        function updateMovesLog() {
            const logElement = document.getElementById('movesLog');
            if (moveLog.length === 0) {
                logElement.textContent = 'No moves yet...';
            } else {
                logElement.textContent = moveLog.join('\n');
                logElement.scrollTop = logElement.scrollHeight;
            }
        }

        function checkWinCondition() {
            const allCompleted = bolts.every((_, i) => boltCompleted[i] || bolts[i].length === 0);
            if (allCompleted && bolts.some((_, i) => boltCompleted[i])) {
                showMessage('🎉 Congratulations! All bolts completed! 🎉', 'success');
                return true;
            }
            return false;
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            setTimeout(() => {
                if (document.getElementById('message').textContent === msg) {
                    messageDiv.className = 'message info';
                    messageDiv.textContent = 'Click on a bolt to select it, then click on another bolt to move the top nut';
                }
            }, 3000);
        }

        function renderGame() {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '';
            
            for (let i = 0; i < bolts.length; i++) {
                const boltContainer = document.createElement('div');
                boltContainer.className = 'bolt-container';
                
                const bolt = document.createElement('div');
                bolt.className = 'bolt';
                if (selectedBolt === i) {
                    bolt.classList.add('selected');
                }
                if (boltCompleted[i]) {
                    bolt.classList.add('completed');
                }
                
                const nutContainer = document.createElement('div');
                nutContainer.style.display = 'flex';
                nutContainer.style.flexDirection = 'column';
                nutContainer.style.width = '100%';
                nutContainer.style.alignItems = 'center';
                nutContainer.style.justifyContent = 'flex-start';
                
                for (let j = 0; j < bolts[i].length; j++) {
                    const nut = document.createElement('div');
                    const color = bolts[i][j];
                    nut.className = `nut ${colorMap[color] || 'color-blue'}`;
                    nut.textContent = color;
                    nutContainer.appendChild(nut);
                }
                
                bolt.appendChild(nutContainer);
                
                const header = document.createElement('div');
                header.className = 'bolt-header';
                header.innerHTML = `<span class="bolt-number">Bolt ${i + 1}</span><br>${bolts[i].length}/4`;
                
                boltContainer.appendChild(bolt);
                boltContainer.appendChild(header);
                
                bolt.onclick = (function(boltIndex) {
                    return function() {
                        handleBoltClick(boltIndex);
                    };
                })(i);
                
                gameArea.appendChild(boltContainer);
            }
            
            const ground = document.createElement('div');
            ground.className = 'ground';
            gameArea.appendChild(ground);
        }

        function handleBoltClick(boltIndex) {
            if (solutionMoves.length > 0 && currentMoveIndex < solutionMoves.length) {
                showMessage('Auto-solver is active. Press Reset to play manually.', 'error');
                return;
            }
            
            if (boltCompleted[boltIndex]) {
                showMessage(`Bolt ${boltIndex + 1} is completed! Cannot move from or to completed bolts.`, 'error');
                return;
            }
            
            if (selectedBolt === null) {
                if (bolts[boltIndex].length > 0) {
                    selectedBolt = boltIndex;
                    renderGame();
                    const topNut = bolts[boltIndex][0];
                    showMessage(`Selected bolt ${boltIndex + 1} (top nut: ${topNut})`, 'info');
                } else {
                    showMessage('Cannot select empty bolt!', 'error');
                }
            } else {
                if (makeMove(selectedBolt, boltIndex, true)) {
                    selectedBolt = null;
                    renderGame();
                } else {
                    showMessage('Invalid move! Check color match and bolt capacity.', 'error');
                    selectedBolt = null;
                    renderGame();
                }
            }
        }

        function resetGame() {
            const levelText = document.getElementById('levelInput').value;
            const parsed = parseLevel(levelText);
            if (parsed) {
                bolts = parsed.stacks.map(stack => [...stack]);
                boltCompleted = new Array(bolts.length).fill(false);
                selectedBolt = null;
                solutionMoves = [];
                currentMoveIndex = 0;
                moveLog = [];
                updateMovesLog();
                renderGame();
                showMessage('Game reset!', 'info');
                checkAndMarkCompletedBolts();
                console.log('Game reset to (top-to-bottom):', bolts.map(b => [...b]));
            }
        }

        function loadLevel() {
            const levelText = document.getElementById('levelInput').value;
            const parsed = parseLevel(levelText);
            
            if (!parsed) {
                showMessage('Invalid level format!', 'error');
                return;
            }
            
            numBolts = parsed.numBolts;
            bolts = parsed.stacks.map(stack => [...stack]);
            boltCompleted = new Array(bolts.length).fill(false);
            selectedBolt = null;
            solutionMoves = [];
            currentMoveIndex = 0;
            moveLog = [];
            updateMovesLog();
            renderGame();
            showMessage('Level loaded! Click on bolts to play.', 'info');
            checkAndMarkCompletedBolts();
        }

        function solveGame() {
            showMessage('Solving... This may take a moment.', 'info');
            
            setTimeout(() => {
                const solution = findSolution(bolts, boltCompleted);
                if (solution) {
                    solutionMoves = solution;
                    currentMoveIndex = 0;
                    showMessage(`Solution found! ${solutionMoves.length} moves. Click "Next Move" to execute.`, 'success');
                } else {
                    showMessage('No solution found! The level might be unsolvable.', 'error');
                    solutionMoves = [];
                }
            }, 100);
        }

        function stepSolution() {
            if (solutionMoves.length === 0) {
                showMessage('No solution loaded. Click "Solve" first.', 'error');
                return;
            }
            
            if (currentMoveIndex >= solutionMoves.length) {
                showMessage('Solution complete!', 'success');
                return;
            }
            
            const move = solutionMoves[currentMoveIndex];
            
            if (makeMove(move.src, move.dst, true)) {
                currentMoveIndex++;
                if (currentMoveIndex >= solutionMoves.length) {
                    showMessage('✅ Solution completed!', 'success');
                }
            } else {
                showMessage('Error executing solution move!', 'error');
                solutionMoves = [];
            }
        }

        function findSolution(currentBolts, currentCompleted) {
            return null;
        }

        window.debug = {
            getState: () => bolts.map(b => [...b]),
            getCompleted: () => [...boltCompleted],
            reset: () => resetGame(),
            solve: () => solveGame()
        };

        window.addEventListener('DOMContentLoaded', function() {
            const select = document.querySelector('#levelSelector');
            for (let i = 1; i <= 100; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i;
                select.appendChild(option);
            }
        });

        function fetchLevel(levelNumber) {
            const textarea = document.getElementById('levelInput');
            const select = document.querySelector('#levelSelector');

            fetch(`data/Level${levelNumber}.txt`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Level ${levelNumber} not found`);
                    }
                    return response.text();
                })
                .then(data => {
                    textarea.value = data;
                    select.selectedIndex = levelNumber;
                    loadLevel();
                })
                .catch(error => {
                    console.error('Error:', error);
                    textarea.value = `Error: Could not load Level ${levelNumber}.txt\n\nMake sure the file exists at: data/Level${levelNumber}.txt`;
                });
        }

        function select_level() {
            const select = document.querySelector('#levelSelector');
            const levelNumber = select.value;
            fetchLevel(levelNumber);
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetchLevel(1);
        });
    </script>

    <script src="solver.js"></script>
